{% extends 'base.html' %}
{% block title %}Edit Announcement - DUT Club Management{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="glass-card">
                <div class="mb-4">
                    <a href="/announcements/{{ announcement.id }}" class="btn btn-sm mb-2" style="background: rgba(255,255,255,0.2); color: #fff;">Back</a>
                    <h2 style="color: #fff;">Edit Announcement</h2>
                </div>
                

<form method="POST" enctype="multipart/form-data">
  {{ csrf_token() }}

                    <div class="mb-3">
                        <label style="color: #fff;">Title</label>
                        <input type="text" name="title" class="form-control" required value="{{ announcement.title }}">
                    </div>
                    
                    <div class="mb-3">
                        <label style="color: #fff;">Content</label>
                        <textarea name="content" class="form-control" rows="6" required>{{ announcement.content }}</textarea>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label style="color: #fff;">Priority</label>
                            <select name="priority" class="form-select">
                                <option value="normal" {% if announcement.priority == 'normal' %}selected{% endif %}>Normal</option>
                                <option value="important" {% if announcement.priority == 'important' %}selected{% endif %}>Important</option>
                                <option value="urgent" {% if announcement.priority == 'urgent' %}selected{% endif %}>Urgent</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check mt-4">
                                <input type="checkbox" name="pinned" class="form-check-input" id="pinned" {% if announcement.pinned %}checked{% endif %}>
                                <label class="form-check-label" style="color: #fff;" for="pinned">Pin this announcement</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label style="color: #fff;">Resource Links (one per line)</label>
                        <textarea name="resource_links" class="form-control" rows="3">{% for link in announcement.resource_links %}{{ link }}
{% endfor %}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label style="color: #fff;">Replace Attachment</label>
                        <input type="file" name="attachment" class="form-control">
                        {% if announcement.attachment_url %}
                        <small style="color: rgba(255,255,255,0.5);">Current: {{ announcement.attachment_name }}</small>
                        {% endif %}
                    </div>
                    
                    <button type="submit" class="btn" style="background: rgba(102,126,234,0.8); color: #fff;">Update</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
