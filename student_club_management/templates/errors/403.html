{% extends "base.html" %}

{% block title %}Access Denied - DUT Club Management{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card">
                <div class="card-body">
                    <div class="mb-4">
                        <i class="fas fa-lock fa-4x text-warning"></i>
                    </div>
                    <h1 class="display-4 text-warning">403</h1>

                    <p class="text-muted mb-4">You don't have permission to access this page.</p>
                    <div class="d-flex justify-content-center gap-2">

                            <i class="fas fa-home me-2"></i>Go Home
                        </a>
                        <a href="javascript:history.back()" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Go Back

                </div>
            </div>
        </div>
    </div>
